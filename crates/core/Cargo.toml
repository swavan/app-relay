[package]
name = "apprelay-core"
version = "0.1.0"
edition.workspace = true
repository.workspace = true

[features]
default = []
pipewire-capture = []
macos-screencapturekit = ["dep:screencapturekit", "dep:core-foundation", "dep:core-graphics"]

[dependencies]
apprelay-protocol = { path = "../protocol" }
plist = { version = "1", default-features = false }

[target.'cfg(target_os = "macos")'.dependencies]
screencapturekit = { version = "0.3", optional = true }
core-foundation = { version = "0.10", optional = true }
core-graphics = { version = "0.24", optional = true }

[lib]
path = "src/lib.rs"
