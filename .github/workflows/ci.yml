name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  tauri-rust:
    name: Tauri Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config
      - name: Check
        run: cargo check --manifest-path apps/client-tauri/src-tauri/Cargo.toml --locked
      - name: Test
        run: cargo test --manifest-path apps/client-tauri/src-tauri/Cargo.toml --locked

  client:
    name: Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/client-tauri/package-lock.json
      - name: Install
        run: npm ci
      - name: Audit beta dependencies
        run: npm run audit:beta
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Check packaging config
        run: npm run package:check
